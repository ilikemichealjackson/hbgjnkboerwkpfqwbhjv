<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward Baker Burgundy Cash Camo Tee - Streetwear Collection</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="nav-links">
                    <a href="index.html">Back to Collection</a>
                </div>
<img src="https://raw.githubusercontent.com/ilikemichealjackson/hbgjnkboerwkpfqwbhjv/refs/heads/main/New%20Project%20(13).png" alt="Burgundy Collection">

            </nav>
        </div>
    </header>


    <main class="product-page">
        <div class="product-container">
            <div class="product-gallery">
                <button class="arrow-btn prev" onclick="previousProduct()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="gallery-container">
                    <div class="gallery-main">
                        <img src="https://raw.githubusercontent.com/ilikemichealjackson/hbgjnkboerwkpfqwbhjv/refs/heads/main/image-removebg-preview%20(7).png" alt="Olive Street Cargo Pants">
                    </div>
                    <div class="gallery-secondary">
                        <img src="https://raw.githubusercontent.com/ilikemichealjackson/hbgjnkboerwkpfqwbhjv/refs/heads/main/image-removebg-preview%20(11).png" alt="Olive Street Cargo Pants - Detail">
                    </div>
                </div>
            </div>
            <button class="arrow-btn next" onclick="nextProduct()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
            <div class="product-details">
                <h2>Edward Baker Burgundy Cash Camo Tee</h2>
                <p class="product-price">$20</p>
                
                <div class="detail-section">
                    <h3>Product Details</h3>
                    <ul>
                        <li><strong>Color:</strong> Camo</li>
                        <li><strong>Available Sizes:</strong> S, M, L, XL</li>
                        <li><strong>Category:</strong> Tee</li>
                    </ul>
                </div>

                <div class="detail-section">
                    <h3>Fabric Details</h3>
                    <ul>
                        <li>100% cotton</li>
                        <li>Cash camo graphic print</li>
                        <li>Comfortable fit</li>
                        <li>Machine washable</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="product-nav.js"></script>
</body>
</html>
